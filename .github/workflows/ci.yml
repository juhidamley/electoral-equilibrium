name: CI

on:
  push:
    branches: [ main, '**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint, Format, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project (dev and data extras)
        run: pip install -e '.[dev,data]'

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Run tests
        run: pytest -q

